<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Dashboard — Elecnor ANZ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 1.5rem; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 0.25rem; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .repo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; }
  .repo-card { background: #fff; border: 0.5px solid #e0e0e0; border-left: 3px solid #e0e0e0; border-radius: 12px; overflow: hidden; }
  .repo-card.deploy-success { border-left-color: #4ade80; }
  .repo-card.deploy-failed { border-left-color: #f87171; }
  .repo-card.deploy-progress { border-left-color: #fbbf24; }
  .repo-header { padding: 1rem 1.25rem 0.75rem; border-bottom: 0.5px solid #f0f0f0; display: flex; justify-content: space-between; align-items: flex-start; }
  .repo-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .repo-desc { font-size: 12px; color: #888; }
  .repo-link { font-size: 11px; color: #4ade80; text-decoration: none; flex-shrink: 0; margin-top: 2px; border: 1.5px solid #4ade80; border-radius: 99px; padding: 3px 10px; display: inline-flex; align-items: center; gap: 4px; font-weight: 500; transition: background 0.15s, color 0.15s; }
  .repo-link:hover { background: #4ade80; color: #111; }
  .repo-stats { display: flex; gap: 16px; padding: 0.75rem 1.25rem; border-bottom: 0.5px solid #f0f0f0; }
  .repo-stat { text-align: center; }
  .repo-stat-value { font-size: 18px; font-weight: 600; }
  .repo-stat-label { font-size: 11px; color: #888; margin-top: 2px; }
  .repo-section { padding: 0.75rem 1.25rem; border-bottom: 0.5px solid #f0f0f0; }
  .repo-section:last-child { border-bottom: none; }
  .section-title { font-size: 11px; font-weight: 500; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .commit { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 6px; font-size: 12px; }
  .commit-sha { font-family: monospace; color: #888; flex-shrink: 0; font-size: 11px; background: #f5f5f5; padding: 1px 5px; border-radius: 4px; }
  .commit-msg { color: #333; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .commit-author { color: #aaa; flex-shrink: 0; }
  .contributor { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
  .avatar { width: 22px; height: 22px; border-radius: 50%; }
  .contrib-name { flex: 1; color: #333; }
  .contrib-count { color: #888; font-size: 11px; }
  .lang-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
  .lang-legend { display: flex; flex-wrap: wrap; gap: 8px; font-size: 11px; color: #666; }
  .lang-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .deployment { display: flex; justify-content: space-between; align-items: flex-start; font-size: 12px; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 0.5px solid #f5f5f5; }
  .deployment:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .dep-left { flex: 1; min-width: 0; }
  .dep-env { font-weight: 500; color: #333; font-size: 12px; }
  .dep-msg { color: #888; font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dep-branch { font-size: 10px; color: #aaa; font-family: monospace; margin-top: 2px; }
  .dep-right { text-align: right; flex-shrink: 0; margin-left: 8px; }
  .dep-time { font-size: 11px; color: #aaa; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 500; margin-top: 3px; }
  .badge-success { background: #e6f9f0; color: #1a7a4a; }
  .badge-fail { background: #fdf0f0; color: #c0392b; }
  .badge-progress { background: #fff8e6; color: #b07a00; }
  .badge-idle { background: #f0f0f0; color: #888; }
  .last-push { font-size: 11px; color: #aaa; padding: 0.5rem 1.25rem; }
  .live-url-strip { display: flex; align-items: center; gap: 8px; padding: 0.6rem 1.25rem; border-bottom: 0.5px solid #f0f0f0; background: #f9fffe; }
  .live-url-text { font-size: 11px; font-family: monospace; color: #2a7a4a; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .copy-btn { font-size: 10px; font-weight: 500; color: #4ade80; border: 1.5px solid #4ade80; border-radius: 99px; padding: 2px 9px; background: none; cursor: pointer; flex-shrink: 0; transition: background 0.15s, color 0.15s; }
  .copy-btn:hover { background: #4ade80; color: #111; }
  .copy-btn.copied { background: #4ade80; color: #111; border-color: #4ade80; }
  .loading { color: #888; font-size: 13px; padding: 2rem; text-align: center; }
  .error { color: #c0392b; font-size: 13px; padding: 1rem; background: #fdf0f0; border-radius: 8px; }
  .timestamp { font-size: 11px; color: #aaa; margin-top: 1rem; }
  [data-tooltip] { position: relative; cursor: default; }
  [data-tooltip]:hover::after { content: attr(data-tooltip); position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); background: #222; color: #fff; font-size: 10px; white-space: nowrap; padding: 3px 8px; border-radius: 5px; pointer-events: none; z-index: 10; }
  .readme-btn { font-size: 10px; font-weight: 500; color: #888; border: 1px solid #ddd; border-radius: 99px; padding: 2px 9px; background: none; cursor: pointer; flex-shrink: 0; transition: border-color 0.15s, color 0.15s; margin-left: 6px; }
  .readme-btn:hover { border-color: #888; color: #333; }
  .readme-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 1.5rem; }
  .readme-modal-overlay.open { display: flex; }
  .readme-modal { background: #fff; border-radius: 14px; max-width: 680px; width: 100%; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .readme-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 0.5px solid #f0f0f0; }
  .readme-modal-title { font-size: 14px; font-weight: 600; color: #1a1a1a; }
  .readme-modal-close { background: none; border: none; font-size: 18px; color: #aaa; cursor: pointer; line-height: 1; padding: 0 4px; }
  .readme-modal-close:hover { color: #333; }
  .readme-modal-body { padding: 1.25rem; overflow-y: auto; font-size: 13px; line-height: 1.7; color: #333; }
  .readme-modal-body pre { background: #f5f5f5; border-radius: 6px; padding: 0.75rem; overflow-x: auto; font-size: 11px; margin: 0.5rem 0; }
  .readme-modal-body code { background: #f0f0f0; border-radius: 3px; padding: 1px 5px; font-size: 11px; }
  .readme-modal-body pre code { background: none; padding: 0; }
  .readme-modal-body h1,.readme-modal-body h2,.readme-modal-body h3 { margin: 1rem 0 0.4rem; font-size: 14px; }
  .readme-modal-body h1 { font-size: 16px; }
  .readme-modal-body p { margin-bottom: 0.5rem; }
  .readme-modal-body a { color: #378ADD; }
  .readme-loading { color: #aaa; font-size: 12px; padding: 2rem; text-align: center; }

  @media (prefers-color-scheme: dark) {
    body { background: #111; color: #eee; }
    .repo-card { background: #1c1c1e; border-color: #2c2c2e; }
    .repo-header, .repo-stats, .repo-section, .deployment { border-color: #2c2c2e; }
    .repo-name, .dep-env, .contrib-name, .commit-msg { color: #eee; }
    .commit-sha { background: #2c2c2e; color: #aaa; }
    .badge-idle { background: #2c2c2e; color: #888; }
    .live-url-strip { background: #0e1f15; }
    .live-url-text { color: #4ade80; }
    .readme-modal { background: #1c1c1e; }
    .readme-modal-header { border-color: #2c2c2e; }
    .readme-modal-title { color: #eee; }
    .readme-modal-body { color: #ccc; }
    .readme-modal-body pre { background: #2c2c2e; }
    .readme-modal-body code { background: #2c2c2e; }
    .readme-btn { border-color: #3a3a3c; color: #888; }
    .readme-btn:hover { border-color: #888; color: #eee; }
  }
</style>
</head>
<body>

<h1>GitHub Dashboard</h1>
<p class="subtitle">Elecnor ANZ — live project activity</p>
<div id="content"><p class="loading">Loading repository data...</p></div>

<script>
const LANG_COLORS = {
  JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5', HTML: '#e34c26',
  CSS: '#563d7c', Vue: '#41b883', Shell: '#89e051', JSON: '#292929',
  Dockerfile: '#384d54', Other: '#ccc'
};

function timeAgo(dateStr) {
  if (!dateStr) return '—';
  const date = new Date(dateStr);
  const diff = (Date.now() - date) / 1000;
  let rel;
  if (diff < 60) rel = 'just now';
  else if (diff < 3600) rel = `${Math.floor(diff/60)}m ago`;
  else if (diff < 86400) rel = `${Math.floor(diff/3600)}h ago`;
  else if (diff < 2592000) rel = `${Math.floor(diff/86400)}d ago`;
  else rel = date.toLocaleDateString('en-AU');
  const abs = date.toLocaleString('en-AU', { timeZone: 'Australia/Sydney', day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  return `<span data-tooltip="${abs}">${rel}</span>`;
}

function statusBadge(status) {
  if (!status) return '';
  const s = status.toLowerCase();
  if (s === 'success') return `<span class="badge badge-success">✓ Success</span>`;
  if (s === 'failure' || s === 'failed') return `<span class="badge badge-fail">✗ Failed</span>`;
  if (s === 'active' || s === 'in_progress') return `<span class="badge badge-progress">⟳ In progress</span>`;
  return `<span class="badge badge-idle">${status}</span>`;
}

function langBar(languages) {
  const total = Object.values(languages).reduce((a, b) => a + b, 0);
  if (!total) return '';
  const entries = Object.entries(languages).sort((a, b) => b[1] - a[1]);
  const bars = entries.map(([lang, bytes]) => {
    const pct = (bytes / total * 100).toFixed(1);
    const color = LANG_COLORS[lang] || LANG_COLORS.Other;
    return `<div style="width:${pct}%;background:${color}" title="${lang} ${pct}%"></div>`;
  }).join('');
  const legend = entries.slice(0, 5).map(([lang, bytes]) => {
    const pct = (bytes / total * 100).toFixed(1);
    const color = LANG_COLORS[lang] || LANG_COLORS.Other;
    return `<span style="display:flex;align-items:center;gap:4px"><span class="lang-dot" style="background:${color}"></span>${lang} ${pct}%</span>`;
  }).join('');
  return `<div class="lang-bar">${bars}</div><div class="lang-legend">${legend}</div>`;
}

function deployBorderClass(deployments) {
  if (!deployments || !deployments.length) return '';
  const s = (deployments[0].status || '').toLowerCase();
  if (s === 'success') return 'deploy-success';
  if (s === 'failure' || s === 'failed') return 'deploy-failed';
  if (s === 'active' || s === 'in_progress') return 'deploy-progress';
  return '';
}

function renderRepo(repo) {
  const commits = repo.commits.map(c => `
    <div class="commit">
      <span class="commit-sha">${c.sha}</span>
      <span class="commit-msg">${c.message}</span>
      <span class="commit-author">${c.author}</span>
    </div>`).join('') || '<p style="font-size:12px;color:#aaa">No commits found</p>';

  const contributors = repo.contributors.map(c => `
    <div class="contributor">
      <img class="avatar" src="${c.avatar}" alt="${c.login}" loading="lazy">
      <span class="contrib-name">${c.login}</span>
      <span class="contrib-count">${c.contributions} commits</span>
    </div>`).join('') || '<p style="font-size:12px;color:#aaa">No contributors found</p>';

  const deployments = repo.deployments.length ? repo.deployments.map(d => `
    <div class="deployment">
      <div class="dep-left">
        <div class="dep-env">${d.environment || 'production'}</div>
        ${d.commitMessage ? `<div class="dep-msg">${d.commitMessage}</div>` : ''}
        <div class="dep-branch">⎇ ${d.branch}</div>
      </div>
      <div class="dep-right">
        <div class="dep-time">${timeAgo(d.createdAt)}</div>
        ${statusBadge(d.status)}
      </div>
    </div>`).join('')
    : '<p style="font-size:12px;color:#aaa">No Cloudflare Pages project linked</p>';

  const liveUrl = repo.cfProjectUrl
    ? `<a class="repo-link" href="${repo.cfProjectUrl}" target="_blank">↗ Live</a>`
    : '';

  const readmeBtn = repo.hasReadme !== false
    ? `<button class="readme-btn" onclick="openReadme('${repo.name}', this)">README</button>`
    : '';

  const borderClass = deployBorderClass(repo.deployments);

  return `
    <div class="repo-card ${borderClass}">
      <div class="repo-header">
        <div>
          <div class="repo-name">${repo.name}</div>
          ${repo.description ? `<div class="repo-desc">${repo.description}</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0;margin-top:2px">
          ${readmeBtn}
          ${liveUrl}
        </div>
      </div>
      <div class="repo-stats">
        <div class="repo-stat"><div class="repo-stat-value" style="color:#E24B4A">${repo.openIssuesCount}</div><div class="repo-stat-label">Open issues</div></div>
        <div class="repo-stat"><div class="repo-stat-value" style="color:#378ADD">${repo.openPRsCount}</div><div class="repo-stat-label">Open PRs</div></div>
        <div class="repo-stat"><div class="repo-stat-value" style="color:#1D9E75">${repo.stars}</div><div class="repo-stat-label">Stars</div></div>
        <div class="repo-stat"><div class="repo-stat-value" style="color:#D85A30">${repo.forks}</div><div class="repo-stat-label">Forks</div></div>
      </div>
      ${repo.cfProjectUrl ? `
      <div class="live-url-strip">
        <span class="live-url-text">${repo.cfProjectUrl}</span>
        <button class="copy-btn" onclick="(function(btn,url){navigator.clipboard.writeText(url).then(function(){btn.textContent='Copied!';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copy';btn.classList.remove('copied');},1800)});})(this,'${repo.cfProjectUrl}')">Copy</button>
      </div>` : ''}
      <div class="repo-section">
        <div class="section-title">Recent commits</div>
        ${commits}
      </div>
      <div class="repo-section">
        <div class="section-title">Contributors</div>
        ${contributors}
      </div>
      ${Object.keys(repo.languages).length ? `
      <div class="repo-section">
        <div class="section-title">Languages</div>
        ${langBar(repo.languages)}
      </div>` : ''}
      <div class="repo-section">
        <div class="section-title">Cloudflare deployments</div>
        ${deployments}
      </div>
      <div class="last-push">Last push ${timeAgo(repo.lastPush)}</div>
    </div>`;
}

async function load() {
  try {
    const res = await fetch('/api/data');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('content').innerHTML = `
      <div class="repo-grid">
        ${data.repos.map(renderRepo).join('')}
      </div>
      <p class="timestamp">Live data · ${new Date().toLocaleString('en-AU', { timeZone: 'Australia/Sydney' })} AEST</p>
    `;
  } catch (e) {
    document.getElementById('content').innerHTML = `<p class="error">Failed to load data: ${e.message}</p>`;
  }
}

load();
</script>

<!-- README modal -->
<div class="readme-modal-overlay" id="readmeOverlay" onclick="if(event.target===this)closeReadme()">
  <div class="readme-modal">
    <div class="readme-modal-header">
      <span class="readme-modal-title" id="readmeTitle">README</span>
      <button class="readme-modal-close" onclick="closeReadme()">✕</button>
    </div>
    <div class="readme-modal-body" id="readmeBody"><p class="readme-loading">Loading…</p></div>
  </div>
</div>

<script>
// Minimal markdown → HTML (headings, bold, italic, code, pre, links, lists)
function mdToHtml(md) {
  let h = md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, (_,c)=>`<pre><code>${c.trim()}</code></pre>`)
    .replace(/`([^`]+)`/g, (_,c)=>`<code>${c}</code>`)
    .replace(/^#{3} (.+)$/gm, '<h3>$1</h3>')
    .replace(/^#{2} (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/^[-*] (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[huplo])/gm, '');
  return `<p>${h}</p>`;
}

async function openReadme(repoName, btn) {
  document.getElementById('readmeTitle').textContent = `${repoName} — README`;
  document.getElementById('readmeBody').innerHTML = '<p class="readme-loading">Loading…</p>';
  document.getElementById('readmeOverlay').classList.add('open');
  try {
    const res = await fetch(`/api/readme?repo=${encodeURIComponent(repoName)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error || !data.content) throw new Error(data.error || 'No README found');
    const raw = atob(data.content.replace(/\s/g,''));
    document.getElementById('readmeBody').innerHTML = mdToHtml(raw);
  } catch(e) {
    document.getElementById('readmeBody').innerHTML = `<p style="color:#aaa;font-size:12px">Could not load README: ${e.message}</p>`;
  }
}

function closeReadme() {
  document.getElementById('readmeOverlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeReadme(); });
</script>

</body>
</html>
